name: Quick Markers
description: Create scene markers with hotkeys and presets (Shift+I/O for range, Shift+1–9 for instant)
version: 1.2.0
url: https://github.com/PepegaSan/Stash-Folder-Sidebar-Plugin
ui:
  javascript:
    - quickMarkers.js
  css:
    - quickMarkers.css
  assets:
    /: .
settings:
  presetsJson:
    displayName: Marker presets (JSON)
    description: "Presets with primaryTag, optional tags array, and hotkeys. See presets.json.example."
    type: STRING
