name: Folder Sidebar
description: Sidebar with configurable folder shortcuts; browse subfolders and list scenes by path without filters
version: 1.4.0
url: https://github.com/stashapp/stash
ui:
  javascript:
    - folderSidebar.js
  css:
    - folderSidebar.css
  assets:
    /: .
settings:
  foldersJson:
    displayName: Folder list (JSON storage)
    description: "Managed by the folder editor in this settings panel. Do not edit unless you need to remove entries manually."
    type: STRING
